name: Run Polymarket Scraper

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Get repo files
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install packages
        run: |
          Rscript -e 'install.packages(c("httr2", "jsonlite", "tidyverse", "lubridate", "purrr", "glue", "googlesheets4"), repos = "https://cloud.r-project.org")'

      - name: Run run_all.R
        run: Rscript run_all.R

        
